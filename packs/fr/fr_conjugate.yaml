metadata:
  id: "fr_conjugate"
  version: 1
  drill_type: "conjugate"
  author: "Wayne Brissette"
  description: "Starter conjugation drills for French."
  schema_version: 1
  # shuffle_persons: true
  # Use shuffle_persons to randomize person order during practice.

persons:
  - "je"
  - "tu"
  - "il/elle"
  - "nous"
  - "vous"
  - "ils/elles"


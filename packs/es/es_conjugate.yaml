metadata:
  id: "es_conjugate"
  version: 1
  drill_type: "conjugate"
  author: "Wayne Brissette"
  description: "Starter conjugation drills for Spanish."
  schema_version: 1
  # shuffle_persons: true
  # Use shuffle_persons to enable random person order when practicing.

persons:
  - "yo"
  - "tú"
  - "él/ella/usted"
  - "nosotros"
  - "vosotros"
  - "ellos/ellas/ustedes"

entries:
  - id: "001"
    lemma: "ser"
    forms:
      yo:
        positive: ["soy"]
        negative: ["no soy"]
      tú:
        positive: ["eres"]
        negative: ["no eres"]
      él/ella/usted:
        positive: ["es"]
        negative: ["no es"]
      nosotros:
        positive: ["somos"]
        negative: ["no somos"]
      vosotros:
        positive: ["sois"]
        negative: ["no sois"]
      ellos/ellas/ustedes:
        positive: ["son"]
        negative: ["no son"]

  - id: "002"

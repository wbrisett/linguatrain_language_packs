# Linguatrain Conjugate Pack Template
# Rename this file and place it under:
#   packs/<target_lang>/
#
# Notes:
# - Conjugation packs must set metadata.drill_type to "conjugate".
# - schema_version is supported.
# - metadata.shuffle_persons can be used to randomize person order during practice.
# - The persons list defines the drill order when shuffle_persons is not enabled.
# - Each entry contains:
#   - lemma: the dictionary form of the verb
#   - forms: person-by-person accepted answers
# - Each person can contain:
#   - positive: YAML list of accepted positive forms
#   - negative: YAML list of accepted negative forms

metadata:
  id: "starter_conjugate_pack"
  version: 1
  drill_type: "conjugate"
  author: "Your Name"
  description: "Verb conjugation drills."
  schema_version: 1
  tags:
    - "conjugate"
    - "verbs"
  # shuffle_persons: true
  # Use shuffle_persons to randomize person order during practice.

persons:
  - "minä"
  - "sinä"
  - "hän"
  - "me"
  - "te"
  - "he"

entries:
  - id: "001"
    lemma: "puhua"
    forms:
      minä:
        positive:
          - "puhun"
        negative:
          - "en puhu"
      sinä:
        positive:
          - "puhut"
        negative:
          - "et puhu"
      hän:
        positive:
          - "puhuu"
        negative:
          - "ei puhu"
      me:
        positive:
          - "puhumme"
        negative:
          - "emme puhu"
      te:
        positive:
          - "puhutte"
        negative:
          - "ette puhu"
      he:
        positive:
          - "puhuvat"
        negative:
          - "eivät puhu"

  - id: "002"
    lemma: "syödä"
    forms:
      minä:
        positive:
          - "syön"
        negative:
          - "en syö"
      sinä:
        positive:
          - "syöt"
        negative:
          - "et syö"
      hän:
        positive:
          - "syö"
        negative:
          - "ei syö"
      me:
        positive:
          - "syömme"
        negative:
          - "emme syö"
      te:
        positive:
          - "syötte"
        negative:
          - "ette syö"
      he:
        positive:
          - "syövät"
        negative:
          - "eivät syö"
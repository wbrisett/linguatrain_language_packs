# Linguatrain transform pack template
# Place this file under: packs/<target_lang>/
# Rename it to match your pack, for example: transform_basics.yaml
#
# Notes:
# - Transform packs must set `metadata.drill_type` to `transform`.
# - `schema_version` is supported.
# - `metadata.shuffle_cues` randomizes cue order during practice.
# - Each entry contains:
#   - `prompt`: the base sentence
#   - `cues`: one or more cue-driven transformations
# - Each cue contains:
#   - `cue`: the transformation trigger
#   - `steps`: one or more transformation steps
# - Each step contains:
#   - `transform`: a short label used in the UI
#   - `answer`: a YAML list of accepted answers

metadata:
  id: "starter_transform_pack"
  version: 1
  schema_version: 1
  drill_type: "transform"
  author: "Your Name"
  description: "Cue-based sentence transformation drills."
  tags:
    - "transform"
    - "grammar"
  # shuffle_cues: true
  # Use shuffle_cues to randomize cue order during practice.

entries:
  - id: "001"
    prompt: "Minä menen kouluun."
    cues:
      - cue: "eilen"
        steps:
          - transform: "past"
            answer:
              - "Minä menin kouluun eilen."

      - cue: "huomenna"
        steps:
          - transform: "future_context"
            answer:
              - "Minä menen kouluun huomenna."

  - id: "002"
    prompt: "Hän lukee kirjaa."
    cues:
      - cue: "ei"
        steps:
          - transform: "negative"
            answer:
              - "Hän ei lue kirjaa."

      - cue: "eilen"
        steps:
          - transform: "past"
            answer:
              - "Hän luki kirjaa eilen."